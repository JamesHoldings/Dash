<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>Home Control</title>
    <style>
        body, html { 
            margin: 0; padding: 0; height: 100%; width: 100%;
            overflow: hidden; background: #000; 
            /* 1. PHYSICAL LOCK: Stops the 'rubber band' bounce at the CSS level */
            overscroll-behavior: none;
            -webkit-overflow-scrolling: none;
            touch-action: none; 
        }

        .wrapper {
            width: 100vw;
            height: 100vh;
            overflow: hidden;
            position: relative;
            touch-action: none;
        }

        iframe { 
            border: none; 
            position: absolute;
            top: 0; left: 0;
            /* 60% Zoom Logic */
            width: 167%; height: 167%; 
            transform: scale(0.6); 
            transform-origin: 0 0; 
            
            /* ALLOW CLICKS: Ensures the iframe still accepts taps */
            pointer-events: auto;
            touch-action: manipulation;
        }
    </style>
</head>
<body>

    <div class="wrapper">
        <iframe 
            src="https://cast.ewelink.cc/#/control-panel" 
            sandbox="allow-forms allow-scripts allow-same-origin allow-popups"
            id="kiosk-frame">
        </iframe>
    </div>

    <script>
        // THE NUCLEAR SWIPE KILLER
        // This blocks the native iPad 'rubber band' effect entirely
        window.addEventListener('touchmove', function(e) {
            if (e.target.id !== 'kiosk-frame') {
                e.preventDefault();
            }
        }, { passive: false });

        // Blocks 'Pinch to Zoom' which can mess up your layout
        document.addEventListener('gesturestart', function(e) {
            e.preventDefault();
        });

        // Optional: Auto-reload every 12 hours to keep eWeLink connection alive
        setTimeout(function() {
            window.location.reload();
        }, 43200000);
    </script>
</body>
</html>
