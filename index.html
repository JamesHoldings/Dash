<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>Home Control</title>
    <style>
        body, html { 
            margin: 0; padding: 0; height: 100%; width: 100%;
            overflow: hidden; background: #000; 
            /* 1. DISBALE GESTURES: Prevents browser-level swipes & pinches */
            touch-action: none; 
            -webkit-overflow-scrolling: none;
        }

        .wrapper {
            width: 100vw;
            height: 100vh;
            overflow: hidden;
            position: relative;
            /* 2. POINTER CONTROL: Ensures clicks pass through correctly */
            touch-action: none;
        }

        iframe { 
            border: none; 
            position: absolute;
            top: 0; left: 0;
            width: 167%; height: 167%; 
            transform: scale(0.6); 
            transform-origin: 0 0; 
            
            /* 3. ALLOW CLICKS: Ensures the iframe still accepts taps */
            pointer-events: auto;
            touch-action: manipulation;
        }
    </style>
</head>
<body>

    <div class="wrapper">
        <iframe 
            src="https://cast.ewelink.cc/#/control-panel" 
            sandbox="allow-forms allow-scripts allow-same-origin allow-popups"
            id="kiosk-frame">
        </iframe>
    </div>

    <script>
        // 4. THE SWIPE KILLER: Programmatically blocks 'dragging' the page
        document.addEventListener('touchmove', function(e) {
            e.preventDefault();
        }, { passive: false });

        // Allows clicking but blocks the "bounce" effect on old iOS
        document.addEventListener('gesturestart', function(e) {
            e.preventDefault();
        });
    </script>
</body>
</html>
