<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=0.8, maximum-scale=1.0, user-scalable=no">
    
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    
    <title>eWeLink Wrapper</title>

    <script type="module" src="https://unpkg.com/x-frame-bypass"></script>

    <style>
        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            width: 100%;
            overflow: hidden;
            background-color: #000;
        }

        /* 3. THE SCALING: This shrinks the eWeLink dash inside your wrapper */
        #kiosk-frame {
            width: 100%;
            height: 100%;
            border: none;
        }
    </style>
</head>
<body>

    <iframe is="x-frame-bypass" id="kiosk-frame" src="https://cast.ewelink.cc/#/control-panel"></iframe>

</body>
</html>
