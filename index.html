<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=0.7, maximum-scale=1.0, user-scalable=no">
    
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    
    <title>Dash Wrapper</title>

    <script type="module" src="https://unpkg.com/x-frame-bypass"></script>

    <style>
        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            width: 100%;
            overflow: hidden;
            background-color: #000; /* Blends with iPad bezel */
        }

        #wrapper-frame {
            width: 100%;
            height: 100%;
            border: none;
            /* Optional: Extra CSS scaling if the viewport tag isn't enough */
            /* transform: scale(0.9); transform-origin: top left; width: 111%; height: 111%; */
        }
    </style>
</head>
<body>

    <iframe is="x-frame-bypass" id="wrapper-frame" src="https://cast.ewelink.cc"></iframe>

</body>
</html>
