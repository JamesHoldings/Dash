<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>Dash Wrapper</title>
    <style>
        body, html { 
            margin: 0; 
            padding: 0; 
            height: 100%; 
            width: 100%;
            overflow: hidden; 
            background: #000; 
        }

        /* Container ensures no scrollbars appear from the oversized iframe */
        .wrapper {
            width: 100vw;
            height: 100vh;
            overflow: hidden;
            position: relative;
        }

        iframe { 
            border: none; 
            position: absolute;
            top: 0;
            left: 0;
            
            /* MATH: 1 / 0.6 = 166.66% 
               This makes the 'paper' bigger so the 'ink' looks smaller.
            */
            width: 167%; 
            height: 167%; 

            /* Shrinks everything down to 60% of original size */
            transform: scale(0.6); 
            transform-origin: 0 0; 
        }
    </style>
</head>
<body>

    <div class="wrapper">
        <iframe 
            src="https://cast.ewelink.cc" 
            sandbox="allow-forms allow-scripts allow-same-origin allow-popups"
            id="kiosk-frame">
        </iframe>
    </div>

</body>
</html>
