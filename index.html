<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>Home Control</title>
    <style>
        body, html { 
            margin: 0; padding: 0; height: 100%; width: 100%;
            overflow: hidden; background: #000; 
            touch-action: none; 
            -webkit-overflow-scrolling: none;
        }

        /* 1. LOADING OVERLAY: Shown until iframe is ready */
        #loader {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: #000;
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 999;
            color: #444;
            font-family: sans-serif;
            transition: opacity 0.5s ease;
        }

        .wrapper {
            width: 100vw; height: 100vh;
            overflow: hidden; position: relative;
            background: #000;
        }

        iframe { 
            border: none; 
            position: absolute;
            top: 0; left: 0;
            width: 167%; height: 167%; 
            
            /* 2. PRELOAD POSITIONING: 
               Starts invisible and uses translate3d to force GPU rendering */
            opacity: 0;
            transform: scale(0.6) translate3d(0,0,0); 
            transform-origin: 0 0; 
            transition: opacity 0.8s ease-in;
            
            pointer-events: auto;
            touch-action: manipulation;
        }
    </style>
</head>
<body>

    <div id="loader">
        <div style="text-align: center;">
            <div style="border: 3px solid #333; border-top: 3px solid #00aaff; border-radius: 50%; width: 30px; height: 30px; animation: spin 1s linear infinite; margin: 0 auto 10px;"></div>
            <span>Initialising Dash...</span>
        </div>
    </div>

    <div class="wrapper">
        <iframe 
            src="https://cast.ewelink.cc/#/control-panel" 
            sandbox="allow-forms allow-scripts allow-same-origin allow-popups"
            id="kiosk-frame">
        </iframe>
    </div>

    <style>
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>

    <script>
        const frame = document.getElementById('kiosk-frame');
        const loader = document.getElementById('loader');

        // 3. THE REVEAL LOGIC: Only show once fully loaded
        frame.onload = function() {
            // Slight delay ensures the internal eWeLink JS has rendered the tiles
            setTimeout(() => {
                frame.style.opacity = '1';
                loader.style.opacity = '0';
                setTimeout(() => loader.style.display = 'none', 500);
            }, 1500);
        };

        // 4. THE GESTURE LOCKS
        document.addEventListener('touchmove', function(e) {
            e.preventDefault();
        }, { passive: false });

        document.addEventListener('gesturestart', function(e) {
            e.preventDefault();
        });

        // Preload hack: Refresh page if it gets stuck on a white screen for > 15s
        setTimeout(() => {
            if(loader.style.display !== 'none') {
                window.location.reload();
            }
        }, 15000);
    </script>
</body>
</html>
